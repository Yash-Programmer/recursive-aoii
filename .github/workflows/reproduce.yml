name: reproduce

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  reproduce-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Reproduce (fast — symbolic checks + 42 tests + figures)
        run: python code/reproduce.py --fast
      - name: Tier-2 lemma probes (universal age bound, NQD, causal independence)
        run: python code/verify/verify_strongaccept.py
